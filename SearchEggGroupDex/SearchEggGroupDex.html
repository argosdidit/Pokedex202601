<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SearchEggGroupDex</title>
  <link rel="icon" id="dynamic-favicon">
  <div field-page-style></div>
</head>

<body>
  <!-- 上部タイトル -->
  <div class="top" area-top>
    <div class="top-left">
      <button class="menu-btn" id="menu-btn">☰</button>
    </div>

    <div class="top-center">
      <div class="title-bg">
        <div class="page-title" field-page-title></div>
      </div>
    </div>

    <div class="top-right"></div>
  </div>
  <div area-sidebar></div>

  <div class="main-content" id="main-content">
    <div field-setting-commands></div>
    <div field-decision-button></div>
    <!-- 検索フィールド -->
    <div class="search-wrapper">
      <div field-search-label></div>
      <div class="search-area">
      <!-- 名前検索 -->
      <div class="left-and-right">
        <div field-left-name></div>
        <div class="right">
          <input type="text" id="TxtSearchName">
        </div>
      </div>
      <div id="TblSearchEggGroup" class="type-table"></div>
      <!-- 地方 -->
      <select id="DdlSearchRegion">
        <div field-combobox-region></div>
      </select>
      
      <!-- 世代 -->
      <select id="DdlSearchGen">
        <div field-combobox-generation></div>
      </select>
      
      <!-- 検索ボタン -->
      <div field-search-button></div>
    </div>
  </div>
  <!-- 検索結果 -->
  <div field-result-template></div>
  
  <div class="bottom"></div>
  <script src="SearchEggGroupDex.js"></script>

</body>
</html>
